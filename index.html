<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fleet P&L Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
@media print{
  .topbar,.sidebar,.btn-primary,.btn-danger,.add-btn,.month-btn,.summary-btn,#download-btn{display:none!important;}
  .content{padding:0!important;}
  .card{break-inside:avoid;border:1px solid #ccc!important;}
}
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#ffffff;--bg2:#f5f5f2;--bg3:#eeecea;
  --text:#1a1a1a;--text2:#555;--text3:#888;
  --border:#e0ddd8;--border2:#c8c5c0;
  --green:#3B6D11;--green-bg:#EAF3DE;
  --red:#A32D2D;--red-bg:#FCEBEB;
  --amber:#854F0B;--amber-bg:#FAEEDA;
  --teal:#0F6E56;--teal-bg:#1D9E75;
  --navy:#1D3557;--blue:#0C447C;--blue-bg:#E6F1FB;
  --radius:8px;--radius-lg:12px;
}
body{font-family:Arial,sans-serif;background:var(--bg2);color:var(--text);font-size:14px;line-height:1.5;}

/* LAYOUT */
.app{display:flex;flex-direction:column;min-height:100vh;}
.topbar{background:var(--navy);color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;}
.topbar h1{font-size:16px;font-weight:600;letter-spacing:0.02em;}
.topbar span{font-size:12px;opacity:0.7;}
.main{display:flex;flex:1;gap:0;}
.sidebar{width:200px;min-width:200px;background:var(--bg);border-right:1px solid var(--border);padding:16px 0;}
.content{flex:1;padding:24px;overflow-y:auto;}

/* SIDEBAR */
.sidebar-section{padding:0 12px;margin-bottom:8px;}
.sidebar-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;padding:0 4px;margin-bottom:6px;}
.month-btn{width:100%;text-align:left;padding:8px 12px;border:none;background:none;cursor:pointer;border-radius:var(--radius);font-size:13px;color:var(--text2);display:flex;align-items:center;justify-content:space-between;}
.month-btn:hover{background:var(--bg2);}
.month-btn.active{background:var(--blue-bg);color:var(--blue);font-weight:600;}
.month-btn.has-data::after{content:'';width:6px;height:6px;border-radius:50%;background:var(--teal-bg);}
.add-btn{width:calc(100% - 24px);margin:8px 12px;padding:8px;border:1px dashed var(--border2);background:none;border-radius:var(--radius);cursor:pointer;font-size:13px;color:var(--text3);}
.add-btn:hover{background:var(--bg2);color:var(--text);}
.summary-btn{width:100%;text-align:left;padding:8px 12px;border:none;background:none;cursor:pointer;border-radius:var(--radius);font-size:13px;color:var(--text2);font-weight:500;}
.summary-btn:hover{background:var(--bg2);}
.summary-btn.active{background:var(--navy);color:#fff;}

/* CARDS */
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:16px;}
.card-title{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:14px;}
.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:16px;}
.metric{background:var(--bg2);border-radius:var(--radius);padding:12px 14px;}
.metric .lbl{font-size:11px;color:var(--text3);margin-bottom:4px;}
.metric .val{font-size:20px;font-weight:600;}
.metric .sub{font-size:11px;color:var(--text3);margin-top:2px;}
.green{color:var(--green);}
.red{color:var(--red);}
.amber{color:var(--amber);}

/* FORM */
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;}
.field{display:flex;flex-direction:column;gap:4px;}
.field label{font-size:12px;color:var(--text2);}
.field input{padding:8px 10px;border:1px solid var(--border2);border-radius:var(--radius);font-size:14px;color:var(--text);background:var(--bg);outline:none;}
.field input:focus{border-color:#378ADD;box-shadow:0 0 0 2px rgba(55,138,221,0.15);}
.field .tag{font-size:11px;color:var(--text3);margin-top:2px;}
.input-highlight input{background:#EAF3DE;border-color:#97C459;color:#27500A;}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:13px;}
.tbl td{padding:7px 10px;border-bottom:1px solid var(--border);}
.tbl td:last-child{text-align:right;font-weight:500;}
.tbl tr:last-child td{border-bottom:none;}
.tbl .total-row td{background:var(--bg2);font-weight:600;}
.tbl .teal-row td{background:var(--teal-bg);color:#fff;font-weight:600;}
.tbl .amber-row td{background:var(--amber-bg);color:var(--amber);font-weight:600;}

/* DUTY CARDS */
.duty-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;}
.duty-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;}
.duty-card .dtitle{font-size:12px;font-weight:600;color:var(--blue);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);}

/* BUTTONS */
.btn-primary{padding:10px 24px;background:var(--navy);color:#fff;border:none;border-radius:var(--radius);cursor:pointer;font-size:14px;font-weight:600;width:100%;margin-top:8px;}
.btn-primary:hover{background:#162940;}
.btn-danger{padding:6px 12px;background:none;border:1px solid var(--border2);border-radius:var(--radius);cursor:pointer;font-size:12px;color:var(--red);}
.btn-danger:hover{background:var(--red-bg);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:100;}
.modal{background:var(--bg);border-radius:var(--radius-lg);padding:24px;width:340px;box-shadow:0 8px 32px rgba(0,0,0,0.15);}
.modal h3{margin-bottom:16px;font-size:16px;}
.modal select{width:100%;padding:8px 10px;border:1px solid var(--border2);border-radius:var(--radius);font-size:14px;margin-bottom:16px;}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;}
.modal-btns button{padding:8px 16px;border-radius:var(--radius);cursor:pointer;font-size:13px;}
.modal-btns .cancel{border:1px solid var(--border2);background:none;}
.modal-btns .confirm{background:var(--navy);color:#fff;border:none;}

/* CHART */
.chart-wrap{position:relative;width:100%;height:280px;margin-top:12px;}

/* WELCOME */
.welcome{text-align:center;padding:60px 20px;color:var(--text3);}
.welcome h2{font-size:20px;color:var(--text);margin-bottom:8px;}
.welcome p{font-size:14px;max-width:360px;margin:0 auto 20px;}

/* FIXED COSTS TABLE */
.fixed-table{font-size:12px;}
.fixed-table td{padding:5px 8px;border-bottom:1px solid var(--border);}
.fixed-table td:last-child{text-align:right;}

hr.sec{border:none;border-top:1px solid var(--border);margin:20px 0;}

@media(max-width:600px){
  .sidebar{display:none;}
  .content{padding:12px;}
}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <h1>Fleet P&L Tracker</h1>
    <span id="save-status">All data saved locally</span>
  </div>
  <div class="main">
    <div class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">Months</div>
        <div id="month-list"></div>
        <button class="add-btn" onclick="showAddModal()">+ Add month</button>
      </div>
      <div class="sidebar-section" style="margin-top:8px;">
        <button class="summary-btn" id="summary-tab-btn" onclick="showSummary()">Summary view</button>
      </div>
    </div>
    <div class="content" id="content">
      <div class="welcome">
        <h2>Welcome to Fleet P&L Tracker</h2>
        <p>Add a month from the sidebar to start entering your monthly data and see your P&L analysis.</p>
        <button class="btn-primary" style="width:auto;" onclick="showAddModal()">+ Add your first month</button>
      </div>
    </div>
  </div>
</div>

<!-- Add Month Modal -->
<div class="modal-overlay" id="add-modal" style="display:none;">
  <div class="modal">
    <h3>Add month</h3>
    <select id="month-select"></select>
    <div class="modal-btns">
      <button class="cancel" onclick="hideModal()">Cancel</button>
      <button class="confirm" onclick="confirmAddMonth()">Add</button>
    </div>
  </div>
</div>

<script>
const FIXED_COSTS = [
  ["Driver salary", 18000],["Your salary", 18000],["EMI", 12000],
  ["Office + utilities", 9000],["Police", 1500],["Misc + bribe", 2000],
  ["Tyre", 2000],["Insurance", 1700],["Maintenance + repair", 10000]
];
const FIXED_TOTAL = 74200;
const MY_SALARY = 18000;
const EXTRA_TAKEHOME = 5000;
const FOOD_RATE = 200;
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const YEARS = ["2026","2027"];

let state = loadState();
let activeMonth = null;
let summaryChart = null;

function loadState(){
  try{ return JSON.parse(localStorage.getItem('fleet_pl_v2')) || {months:{}}; }
  catch(e){ return {months:{}}; }
}
function saveState(){
  localStorage.setItem('fleet_pl_v2', JSON.stringify(state));
  document.getElementById('save-status').textContent = 'Saved ' + new Date().toLocaleTimeString();
}

function fmt(n){ return '₹' + Math.round(n).toLocaleString('en-IN'); }
function pct(n){ return (Math.round(n*10)/10).toFixed(1) + '%'; }

function getAllMonthOptions(){
  let opts = [];
  YEARS.forEach(y => MONTHS.forEach(m => opts.push(m+' '+y)));
  return opts.filter(k => !state.months[k]);
}

function renderSidebar(){
  const list = document.getElementById('month-list');
  list.innerHTML = '';
  Object.keys(state.months).forEach(k => {
    const btn = document.createElement('button');
    btn.className = 'month-btn' + (activeMonth===k?' active':'') + (state.months[k].inputs?' has-data':'');
    btn.innerHTML = `<span>${k}</span>`;
    btn.onclick = () => { activeMonth=k; document.getElementById('summary-tab-btn').classList.remove('active'); renderSidebar(); renderMonth(k); };
    list.appendChild(btn);
  });
  document.getElementById('summary-tab-btn').classList.toggle('active', activeMonth==='__summary');
}

function showAddModal(){
  const opts = getAllMonthOptions();
  const sel = document.getElementById('month-select');
  sel.innerHTML = opts.map(o => `<option>${o}</option>`).join('');
  document.getElementById('add-modal').style.display='flex';
}
function hideModal(){ document.getElementById('add-modal').style.display='none'; }
function confirmAddMonth(){
  const k = document.getElementById('month-select').value;
  if(!k) return;
  state.months[k] = {inputs:null, result:null};
  saveState();
  hideModal();
  activeMonth = k;
  renderSidebar();
  renderMonth(k);
}

function renderMonth(k){
  const inp = state.months[k].inputs || {};
  const content = document.getElementById('content');
  content.innerHTML = `
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
    <div>
      <h2 style="font-size:18px;font-weight:600;color:var(--navy);">${k}</h2>
      <p style="font-size:12px;color:var(--text3);">Enter monthly figures and click Calculate</p>
    </div>
    <button class="btn-danger" onclick="deleteMonth('${k}')">Delete month</button>
  </div>

  <div class="card">
    <div class="card-title">Revenue</div>
    <div class="form-grid">
      <div class="field input-highlight"><label>Base revenue (₹)</label><input type="number" id="baseRev" value="${inp.baseRev||''}" placeholder="e.g. 170000"/></div>
      <div class="field input-highlight"><label>Add-on revenue (₹)</label><input type="number" id="addonRev" value="${inp.addonRev||''}" placeholder="e.g. 20000"/></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Own duties</div>
    <div class="form-grid">
      <div class="field input-highlight"><label>Vehicle duties</label><input type="number" id="vDuties" value="${inp.vDuties||''}" placeholder="e.g. 10"/><span class="tag">Fuel + maintenance + toll</span></div>
      <div class="field input-highlight"><label>Bus duties</label><input type="number" id="bDuties" value="${inp.bDuties||''}" placeholder="e.g. 2"/><span class="tag">Bus expenses combined</span></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Variable costs (own duties)</div>
    <div class="form-grid">
      <div class="field input-highlight"><label>Fuel (₹)</label><input type="number" id="fuel" value="${inp.fuel||''}" placeholder="vehicle only"/></div>
      <div class="field input-highlight"><label>Variable maintenance (₹)</label><input type="number" id="vmaint" value="${inp.vmaint||''}" placeholder="vehicle only"/></div>
      <div class="field input-highlight"><label>Toll & taxes (₹)</label><input type="number" id="toll" value="${inp.toll||''}" placeholder="vehicle only"/></div>
      <div class="field input-highlight"><label>Bus expenses (₹)</label><input type="number" id="busExp" value="${inp.busExp||''}" placeholder="tickets + convenience"/></div>
    </div>
    <div style="margin-top:12px;padding:10px;background:var(--bg2);border-radius:var(--radius);font-size:12px;color:var(--text3);">
      Food auto-calculated: ₹200 × (vehicle + bus duties)
    </div>
  </div>

  <div class="card" style="border:1.5px dashed var(--border2);">
    <div class="card-title" style="color:var(--amber);">Hired duties — bonus income <span style="font-weight:400;font-size:11px;color:var(--text3);">(kept separate from main P&L)</span></div>
    <div class="form-grid">
      <div class="field input-highlight"><label>No. of hired duties</label><input type="number" id="hDuties" value="${inp.hDuties||''}" placeholder="e.g. 3"/></div>
      <div class="field input-highlight"><label>Total bill raised (₹)</label><input type="number" id="hBill" value="${inp.hBill||''}" placeholder="e.g. 50000"/><span class="tag">What you charged the client</span></div>
      <div class="field input-highlight"><label>Total hiring cost (₹)</label><input type="number" id="hCost" value="${inp.hCost||''}" placeholder="e.g. 30000"/><span class="tag">What you paid the vehicle owner</span></div>
    </div>
  </div>

  <div class="card" style="background:var(--bg2);">
    <div class="card-title">Fixed costs (reference — hardcoded)</div>
    <table class="tbl fixed-table">
      ${FIXED_COSTS.map((fc,i)=>`<tr style="background:${i%2===0?'var(--bg2)':'var(--bg)'}"><td>${fc[0]}</td><td>${fmt(fc[1])}</td></tr>`).join('')}
      <tr class="teal-row"><td>Total fixed</td><td>${fmt(FIXED_TOTAL)}</td></tr>
    </table>
  </div>

  <button class="btn-primary" onclick="calculate('${k}')">Calculate P&L</button>

  <div id="output-${k}" style="margin-top:20px;">${state.months[k].result ? renderOutput(k, state.months[k].result) : ''}</div>
  `;
}

function g(id){ return parseFloat(document.getElementById(id).value)||0; }

function calculate(k){
  const baseRev=g('baseRev'), addonRev=g('addonRev');
  const vD=g('vDuties'), bD=g('bDuties');
  const hD=g('hDuties'), hBill=g('hBill'), hCost=g('hCost');
  const fuel=g('fuel'), vmaint=g('vmaint'), toll=g('toll');
  const busTicket=g('busExp'), conv=0;

  state.months[k].inputs = {baseRev,addonRev,vD,bD,hD,hBill,hCost,fuel,vmaint,toll,busExp:busTicket};

  const ownDuties = vD+bD;
  if(ownDuties===0 && hD===0){ alert('Enter at least one duty.'); return; }
  if(ownDuties===0 && hD>0){ alert('Enter at least one own duty (vehicle or bus).'); return; }

  const safeOwn = ownDuties||1;
  const safeV = vD||1, safeB = bD||1;

  // ── OWN DUTIES P&L (vehicle + bus only) ────────────────────────────────
  const totalRev = (baseRev+addonRev)*0.99;
  const food     = ownDuties * FOOD_RATE;
  const vVar     = fuel + vmaint + toll + (vD * FOOD_RATE);
  const bVar     = busTicket + conv + (bD * FOOD_RATE);
  const ownVar   = vVar + bVar;
  const netProfit   = totalRev - FIXED_TOTAL - ownVar;
  const netMargin   = (netProfit / totalRev) * 100;
  const effectiveProfit = netProfit + MY_SALARY + EXTRA_TAKEHOME;  // renamed

  // Per-duty (own only)
  const fixedPerDuty = FIXED_TOTAL / safeOwn;
  const revPerDuty   = totalRev / safeOwn;
  const avgVarPD     = ownVar / safeOwn;
  const vVarPD = vVar / safeV;
  const bVarPD = bVar / safeB;

  // ── HIRED DUTIES — BONUS (completely separate) ─────────────────────────
  const hProfit    = hBill - hCost;          // total hired profit
  const hMargin    = hBill > 0 ? (hProfit / hBill) * 100 : 0;
  const hProfitPD  = hD > 0 ? hProfit / hD : 0;

  // ── EFFECTIVE TAKE-HOME = effectiveProfit + hired bonus ────────────────
  const effectiveTakeHome = effectiveProfit + hProfit;

  const r = {
    // own P&L
    totalRev, ownVar, vVar, bVar, food,
    netProfit, netMargin, effectiveProfit, effectiveTakeHome,
    // own per-duty
    fixedPerDuty, revPerDuty, ownDuties, vD, bD,
    vVarPD, bVarPD, avgVarPD,
    vTotalPD  : vVarPD + fixedPerDuty,
    bTotalPD  : bVarPD + fixedPerDuty,
    avgTotalPD: avgVarPD + fixedPerDuty,
    vProfitPD : revPerDuty - (vVarPD + fixedPerDuty),
    bProfitPD : revPerDuty - (bVarPD + fixedPerDuty),
    avgProfitPD: revPerDuty - (avgVarPD + fixedPerDuty),
    breakEvenPD   : fixedPerDuty + avgVarPD,
    breakEvenTotal: (fixedPerDuty + avgVarPD) * safeOwn,
    // hired bonus
    hD, hBill, hCost, hProfit, hMargin, hProfitPD,
  };
  r.vProfitPct   = (r.vProfitPD   / revPerDuty) * 100;
  r.bProfitPct   = (r.bProfitPD   / revPerDuty) * 100;
  r.avgProfitPct = (r.avgProfitPD / revPerDuty) * 100;

  state.months[k].result = r;
  saveState();
  document.getElementById(`output-${k}`).innerHTML = renderOutput(k,r);
}

function renderOutput(k,r){
  const ownDutyCards = [
    {title:`Overall avg (${r.ownDuties} own duties)`, vPD:r.avgVarPD, tPD:r.avgTotalPD, prPD:r.avgProfitPD, prPct:r.avgProfitPct, show:r.ownDuties>0},
    {title:`Vehicle duties (${r.vD})`,                vPD:r.vVarPD,   tPD:r.vTotalPD,   prPD:r.vProfitPD,   prPct:r.vProfitPct,   show:r.vD>0},
    {title:`Bus duties (${r.bD})`,                    vPD:r.bVarPD,   tPD:r.bTotalPD,   prPD:r.bProfitPD,   prPct:r.bProfitPct,   show:r.bD>0},
  ].filter(d=>d.show);

  return `
  <hr class="sec"/>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
    <div style="font-size:13px;color:var(--text3);">P&L result for <strong style="color:var(--navy);">${k}</strong></div>
    <button id="download-btn" onclick="downloadPDF('${k}')" style="padding:8px 16px;background:var(--navy);color:#fff;border:none;border-radius:var(--radius);cursor:pointer;font-size:13px;font-weight:600;">Download JPG</button>
  </div>
  <div id="pdf-content-${k}">

  <!-- ── TOP METRICS (own duties only) ── -->
  <div class="metric-grid">
    <div class="metric">
      <div class="lbl">Total revenue</div>
      <div class="val green">${fmt(r.totalRev)}</div>
      <div class="sub">own duties · after 1% deduction</div>
    </div>
    <div class="metric">
      <div class="lbl">Total costs</div>
      <div class="val red">${fmt(FIXED_TOTAL + r.ownVar)}</div>
      <div class="sub">${pct((FIXED_TOTAL + r.ownVar) / r.totalRev * 100)} of revenue</div>
    </div>
    <div class="metric">
      <div class="lbl">Net profit</div>
      <div class="val ${r.netProfit>=0?'green':'red'}">${fmt(r.netProfit)}</div>
      <div class="sub">${pct(r.netMargin)} of revenue · own duties</div>
    </div>
    <div class="metric">
      <div class="lbl">Effective profit</div>
      <div class="val green">${fmt(r.effectiveProfit)}</div>
      <div class="sub">net profit + salary + ₹5k · excl. hired bonus</div>
    </div>
  </div>

  <!-- ── HIRED BONUS BANNER (only if hired duties entered) ── -->
  ${r.hD > 0 ? `
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;">
    <div style="background:var(--amber-bg);border:1.5px solid #D4972A;border-radius:var(--radius-lg);padding:16px 20px;">
      <div style="font-size:11px;font-weight:600;color:var(--amber);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:12px;">
        Hired duties bonus — ${r.hD} dut${r.hD>1?'ies':'y'}
      </div>
      <table class="tbl" style="font-size:13px;">
        <tr><td>Bill raised</td><td style="text-align:right;font-weight:600;">${fmt(r.hBill)}</td></tr>
        <tr style="background:rgba(0,0,0,0.04)"><td>Hiring cost</td><td style="text-align:right;font-weight:600;">${fmt(r.hCost)}</td></tr>
        <tr><td>Profit / duty</td><td style="text-align:right;font-weight:600;">${fmt(r.hProfitPD)}</td></tr>
        <tr style="background:var(--amber);border-radius:4px;">
          <td style="color:#fff;font-weight:700;">Bonus profit</td>
          <td style="text-align:right;color:#fff;font-weight:700;">${fmt(r.hProfit)} <span style="font-weight:400;">(${pct(r.hMargin)})</span></td>
        </tr>
      </table>
    </div>
    <div style="background:var(--green-bg);border:1.5px solid #7AAD45;border-radius:var(--radius-lg);padding:16px 20px;">
      <div style="font-size:11px;font-weight:600;color:var(--green);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:12px;">
        Effective take-home
      </div>
      <div style="font-size:28px;font-weight:700;color:var(--green);margin-bottom:6px;">${fmt(r.effectiveTakeHome)}</div>
      <table class="tbl" style="font-size:12px;color:var(--text2);">
        <tr><td>Effective profit</td><td style="text-align:right;">${fmt(r.effectiveProfit)}</td></tr>
        <tr style="background:rgba(0,0,0,0.04)"><td>+ Hired bonus</td><td style="text-align:right;">${fmt(r.hProfit)}</td></tr>
      </table>
      <div style="margin-top:8px;font-size:11px;color:var(--green);">profit + salary + ₹5k + hired bonus</div>
    </div>
  </div>` : `
  <div class="metric-grid" style="margin-bottom:16px;">
    <div class="metric" style="background:var(--green-bg);border:1px solid #7AAD45;">
      <div class="lbl" style="color:var(--green);">Effective take-home</div>
      <div class="val green">${fmt(r.effectiveTakeHome)}</div>
      <div class="sub">profit + salary + ₹5k</div>
    </div>
  </div>`}

  <!-- ── COST BREAKDOWN + BREAK-EVEN ── -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;">
    <div class="card" style="margin:0;">
      <div class="card-title">Cost breakdown — own duties</div>
      <table class="tbl">
        <tr><td>Fixed costs</td><td>${fmt(FIXED_TOTAL)} <span style="color:var(--text3);font-weight:400;">(${pct(FIXED_TOTAL/r.totalRev*100)})</span></td></tr>
        <tr style="background:var(--bg2)"><td>Vehicle variable</td><td>${fmt(r.vVar)} <span style="color:var(--text3);font-weight:400;">(${pct(r.vVar/r.totalRev*100)})</span></td></tr>
        <tr><td>Bus variable</td><td>${fmt(r.bVar)} <span style="color:var(--text3);font-weight:400;">(${pct(r.bVar/r.totalRev*100)})</span></td></tr>
        <tr style="background:var(--bg2)"><td>Food (auto)</td><td>${fmt(r.food)}</td></tr>
        <tr class="teal-row"><td>Total variable</td><td>${fmt(r.ownVar)} <span style="font-weight:400;">(${pct(r.ownVar/r.totalRev*100)})</span></td></tr>
      </table>
    </div>
    <div class="card" style="margin:0;">
      <div class="card-title">Break-even — own duties</div>
      <table class="tbl">
        <tr><td>Fixed / duty</td><td>${fmt(r.fixedPerDuty)}</td></tr>
        <tr style="background:var(--bg2)"><td>Avg variable / duty</td><td>${fmt(r.avgVarPD)}</td></tr>
        <tr class="amber-row"><td>Break-even / duty</td><td>${fmt(r.breakEvenPD)}</td></tr>
        <tr><td>Break-even revenue</td><td>${fmt(r.breakEvenTotal)}</td></tr>
        <tr><td>Above break-even</td><td class="${r.netProfit>=0?'green':'red'}">${fmt(Math.abs(r.netProfit))}</td></tr>
      </table>
    </div>
  </div>

  <!-- ── PER DUTY ANALYSIS — OWN ONLY ── -->
  <div class="card">
    <div class="card-title">Per duty analysis — avg revenue/duty: ${fmt(r.revPerDuty)}</div>
    <div class="duty-grid">
      ${ownDutyCards.map(d=>`
      <div class="duty-card">
        <div class="dtitle">${d.title}</div>
        <table class="tbl" style="font-size:12px;">
          <tr><td>Variable / duty</td><td>${fmt(d.vPD)}</td></tr>
          <tr style="background:var(--bg2)"><td>Fixed share / duty</td><td>${fmt(r.fixedPerDuty)}</td></tr>
          <tr><td>Total cost / duty</td><td>${fmt(d.tPD)}</td></tr>
          <tr class="teal-row"><td>Profit / duty</td><td>${fmt(d.prPD)} <span style="font-weight:400;">(${pct(d.prPct)})</span></td></tr>
        </table>
      </div>`).join('')}
    </div>
  </div>

  </div>
  `;
}

function downloadPDF(k){
  const el = document.getElementById(`pdf-content-${k}`);
  if(!el){ alert('Calculate first.'); return; }
  const btn = document.getElementById('download-btn');
  btn.textContent = 'Generating...';
  btn.disabled = true;
  html2canvas(el, {
    scale: 2,
    useCORS: true,
    backgroundColor: '#ffffff',
    scrollX: 0,
    scrollY: -window.scrollY,
    windowWidth: el.scrollWidth,
    width: el.scrollWidth,
    height: el.scrollHeight
  }).then(canvas => {
    const link = document.createElement('a');
    link.download = `Fleet_PL_${k.replace(' ','_')}.jpg`;
    link.href = canvas.toDataURL('image/jpeg', 0.95);
    link.click();
    btn.textContent = 'Download JPG';
    btn.disabled = false;
  }).catch(err => {
    alert('Export failed: ' + err.message);
    btn.textContent = 'Download JPG';
    btn.disabled = false;
  });
}

function deleteMonth(k){
  if(!confirm(`Delete ${k}?`)) return;
  delete state.months[k];
  saveState();
  activeMonth = Object.keys(state.months)[0]||null;
  renderSidebar();
  if(activeMonth) renderMonth(activeMonth);
  else document.getElementById('content').innerHTML = '<div class="welcome"><h2>No months yet</h2><p>Add a month to get started.</p><button class="btn-primary" style="width:auto;" onclick="showAddModal()">+ Add month</button></div>';
}

function showSummary(){
  activeMonth = '__summary';
  renderSidebar();
  const months = Object.keys(state.months).filter(k => state.months[k].result);
  const content = document.getElementById('content');
  if(!months.length){
    content.innerHTML = '<div class="welcome"><h2>No calculated months yet</h2><p>Calculate at least one month to see the summary.</p></div>';
    return;
  }
  content.innerHTML = `
  <div style="margin-bottom:20px;"><h2 style="font-size:18px;font-weight:600;color:var(--navy);">Summary</h2><p style="font-size:12px;color:var(--text3);">All calculated months</p></div>
  <div class="card">
    <div class="card-title">Month-wise P&L</div>
    <div style="overflow-x:auto;">
    <table class="tbl">
      <tr style="background:var(--navy);color:#fff;">
        <td style="font-weight:600;color:#fff;">Month</td>
        <td style="text-align:right;font-weight:600;color:#fff;">Revenue</td>
        <td style="text-align:right;font-weight:600;color:#fff;">Fixed</td>
        <td style="text-align:right;font-weight:600;color:#fff;">Variable</td>
        <td style="text-align:right;font-weight:600;color:#fff;">Net profit</td>
        <td style="text-align:right;font-weight:600;color:#fff;">Margin</td>
        <td style="text-align:right;font-weight:600;color:#fff;">Hired bonus</td>
        <td style="text-align:right;font-weight:600;color:#fff;">Take-home</td>
      </tr>
      ${months.map((k,i)=>{
        const r=state.months[k].result;
        return `<tr style="background:${i%2===0?'var(--bg2)':'var(--bg)'}">
          <td style="font-weight:600;">${k}</td>
          <td>${fmt(r.totalRev)}</td>
          <td>${fmt(FIXED_TOTAL)}</td>
          <td>${fmt(r.ownVar)}</td>
          <td class="${r.netProfit>=0?'green':'red'}">${fmt(r.netProfit)}</td>
          <td class="${r.netMargin>=0?'green':'red'}">${pct(r.netMargin)}</td>
          <td class="${r.hProfit>0?'amber':''}">${r.hD>0?fmt(r.hProfit):'—'}</td>
          <td class="green">${fmt(r.effectiveTakeHome)}</td>
        </tr>`;
      }).join('')}
      <tr class="teal-row">
        <td>Total</td>
        <td>${fmt(months.reduce((s,k)=>s+state.months[k].result.totalRev,0))}</td>
        <td>${fmt(months.length*FIXED_TOTAL)}</td>
        <td>${fmt(months.reduce((s,k)=>s+state.months[k].result.ownVar,0))}</td>
        <td>${fmt(months.reduce((s,k)=>s+state.months[k].result.netProfit,0))}</td>
        <td>${pct(months.reduce((s,k)=>s+state.months[k].result.netMargin,0)/months.length)}</td>
        <td>${fmt(months.reduce((s,k)=>s+(state.months[k].result.hProfit||0),0))}</td>
        <td>${fmt(months.reduce((s,k)=>s+state.months[k].result.effectiveTakeHome,0))}</td>
      </tr>
    </table>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Revenue vs costs vs profit</div>
    <div style="display:flex;gap:16px;margin-bottom:8px;font-size:12px;color:var(--text3);">
      <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:2px;background:#1D9E75;"></span>Revenue</span>
      <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:2px;background:#E24B4A;"></span>Total costs</span>
      <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:2px;background:#378ADD;"></span>Net profit</span>
    </div>
    <div class="chart-wrap"><canvas id="summaryChart"></canvas></div>
  </div>
  `;
  if(summaryChart) summaryChart.destroy();
  summaryChart = new Chart(document.getElementById('summaryChart'),{
    type:'bar',
    data:{
      labels:months,
      datasets:[
        {label:'Revenue',data:months.map(k=>Math.round(state.months[k].result.totalRev)),backgroundColor:'#1D9E75'},
        {label:'Total costs',data:months.map(k=>Math.round(FIXED_TOTAL+state.months[k].result.ownVar)),backgroundColor:'#E24B4A'},
        {label:'Net profit',data:months.map(k=>Math.round(state.months[k].result.netProfit)),backgroundColor:'#378ADD'},
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        x:{ticks:{autoSkip:false,maxRotation:30,font:{size:11}}},
        y:{ticks:{callback:v=>'₹'+(Math.abs(v)/1000).toFixed(0)+'k'}}
      }
    }
  });
}

renderSidebar();
</script>
</body>
</html>
